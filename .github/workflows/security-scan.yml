name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run security scan
      run: |
        mkdir -p reports
        security-agent --repo-path . --output reports/ --format json

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/
        retention-days: 90

    - name: Comment on PR
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const report = JSON.parse(fs.readFileSync('./reports/security_report.json', 'utf8'));
            const { summary, findings } = report;
            
            let comment = `## 🔒 Security Scan Results\n\n`;
            comment += `**Status**: ${summary.status === 'FAIL' ? '❌' : '✅'} ${summary.status}\n`;
            comment += `**Score**: ${summary.score}\n`;
            comment += `**Total Findings**: ${findings.length}\n\n`;
            
            if (findings.length > 0) {
              comment += `### Top Issues\n`;
              findings.slice(0, 5).forEach((f, i) => {
                comment += `${i+1}. **${f.severity.toUpperCase()}** - ${f.message}\n`;
                comment += `   📄 ${f.file_path}:${f.line_start}\n\n`;
              });
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (e) {
            console.log('Report not found or error parsing:', e.message);
          }