name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install bandit

    - name: Install osv-scanner 
      run: |
        OSV_VERSION=$(curl -s https://api.github.com/repos/google/osv-scanner/releases/latest \
          | jq -r '.tag_name')
        echo "Installing osv-scanner ${OSV_VERSION}"
        curl -fsSL "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64" \
          -o /usr/local/bin/osv-scanner
        chmod +x /usr/local/bin/osv-scanner
        osv-scanner --version

    - name: Install TruffleHog
      run: |
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
          | sh -s -- -b /usr/local/bin
        trufflehog --version

    - name: Verify all tools
      run: |
        echo "--- bandit ---"
        bandit --version
        echo "--- osv-scanner ---"
        osv-scanner --version
        echo "--- trufflehog ---"
        trufflehog --version

    - name: Run security scan
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        mkdir -p reports
        security-agent --repo-path . --format json

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: reports/
        retention-days: 90

    - name: Comment on PR
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = './reports/security_report.json';

          if (!fs.existsSync(reportPath)) {
            console.log('Report not found, skipping comment');
            return;
          }

          try {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const { summary, findings } = report;

            let comment = `## 🔒 Security Scan Results\n\n`;
            comment += `**Status**: ${summary.status === 'FAIL' ? '❌' : '✅'} ${summary.status}\n`;
            comment += `**Score**: ${summary.score}\n`;
            comment += `**Total Findings**: ${findings.length}\n\n`;

            if (findings.length > 0) {
              comment += `### Top Issues\n`;
              findings.slice(0, 5).forEach((f, i) => {
                comment += `${i+1}. **${f.severity.toUpperCase()}** - ${f.message}\n`;
                comment += `   📄 \`${f.file_path}:${f.line_start}\`\n\n`;
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (e) {
            console.log('Error parsing report:', e.message);
          }